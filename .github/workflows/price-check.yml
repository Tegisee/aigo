name: Price Check Bot

on:
  # 긴급 중단 (2026-04-21): 형제 앱 지금이야에서 파트너스 API 시간당 한도 2회 초과 확인.
  # 동일 API 키 공유 중이라 아이고 cron도 즉시 정지. 3회 초과 시 파트너스 이용 제한.
  # Rate Limit 해제 시각: 2026-04-22 07:21 KST 이후.
  # 재개 조건: 지금이야 docs/010 Rate Limit 재확인 + 018 Functions Resolver 배포 후 검토.
  # schedule:
  #   - cron: '0 21 * * *'   # 06:00 KST
  #   - cron: '0 0 * * *'    # 09:00 KST
  #   - cron: '0 3 * * *'    # 12:00 KST
  #   - cron: '0 6 * * *'    # 15:00 KST
  #   - cron: '0 9 * * *'    # 18:00 KST
  #   - cron: '0 12 * * *'   # 21:00 KST
  workflow_dispatch:
    inputs:
      force_night_run:
        description: '21시 야간 기능 강제 실행 (재구매/미접종 알림)'
        required: false
        type: boolean
        default: false

jobs:
  price-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: scripts/price-checker
        run: npm install

      - name: Build TypeScript
        working-directory: scripts/price-checker
        run: npx tsc

      - name: Run price checker
        working-directory: scripts/price-checker
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          FORCE_NIGHT_RUN: ${{ github.event.inputs.force_night_run }}
        run: node dist/index.js
