name: Price Check Bot

on:
  # 비활성화 (2026-04-24): 지금이야 쪽 과호출 의심 → Rate Limit 재발 방지 위해 아이고도 동시 차단.
  # 재활성화 이력: 2026-04-23 (지금이야 018 Resolver 배포 후).
  # 이전 비활성 이력: 2026-04-21 Rate Limit 2회 초과 → 2026-04-22 자연 해제.
  # schedule:
  #   - cron: '0 22 * * *'   # 07:00 KST
  #   - cron: '0 0 * * *'    # 09:00 KST
  #   - cron: '0 2 * * *'    # 11:00 KST
  #   - cron: '0 4 * * *'    # 13:00 KST
  #   - cron: '0 7 * * *'    # 16:00 KST
  #   - cron: '0 10 * * *'   # 19:00 KST
  workflow_dispatch:
    inputs:
      force_night_run:
        description: '21시 야간 기능 강제 실행 (재구매/미접종 알림)'
        required: false
        type: boolean
        default: false

jobs:
  price-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: scripts/price-checker
        run: npm install

      - name: Build TypeScript
        working-directory: scripts/price-checker
        run: npx tsc

      - name: Run price checker
        working-directory: scripts/price-checker
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          FORCE_NIGHT_RUN: ${{ github.event.inputs.force_night_run }}
        run: node dist/index.js
